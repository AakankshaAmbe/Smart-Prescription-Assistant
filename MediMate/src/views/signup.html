<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | MediMate</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="login-card">
    <ul class="nav nav-tabs justify-content-center">
        <li class="nav-item"><a class="nav-link" href="/login.html">Login</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Sign Up</a></li>
    </ul>

    <div class="text-center mb-4">
        <h2 class="fw-bold" style="color: var(--primary-blue);">Create Account</h2>
        <p class="text-muted">Join MediMate and manage your health</p>
    </div>

    <form id="signupForm">
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-person text-primary"></i> Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-phone text-primary"></i> Phone Number</label>
            <input type="tel" name="phone" class="form-control" placeholder="+91 98765 43210" required>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-envelope text-primary"></i> Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-lock text-primary"></i> Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-lock text-primary"></i> Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-login w-100">
            Create Account <i class="bi bi-arrow-right ms-2"></i>
        </button>
    </form>
    
    <div class="back-home-container">
        <a href="/" class="btn-back">
            <i class="bi bi-arrow-left"></i>
            <span>Back to Home</span>
        </a>
    </div>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    try {
        const response = await fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {
            Swal.fire({
                icon: 'success',
                title: 'Success!',
                text: result.message,
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                window.location.href = '/login.html';
            });
        } else {
            Swal.fire({ icon: 'error', title: 'Registration Failed', text: result.message });
        }
    } catch (err) {
        Swal.fire({ icon: 'error', title: 'Error', text: 'Something went wrong!' });
    }
});
</script>

</body>
</html>
