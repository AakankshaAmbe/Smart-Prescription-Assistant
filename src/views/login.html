<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MediMate</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="login-card">
    <ul class="nav nav-tabs justify-content-center">
        <li class="nav-item"><a class="nav-link active" href="#">Login</a></li>
        <li class="nav-item"><a class="nav-link" href="/signup.html">Sign Up</a></li>
    </ul>

    <div class="text-center mb-4">
        <h2 class="fw-bold" style="color: var(--primary-blue);">Welcome Back</h2>
        <p class="text-muted">Login to manage your medications</p>
    </div>

    <form id="loginForm">
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-envelope text-primary"></i> Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-lock text-primary"></i> Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-login w-100">
            Login to MediMate <i class="bi bi-arrow-right ms-2"></i>
        </button>
    </form>

    <div class="back-home-container">
        <a href="/" class="btn-back">
            <i class="bi bi-arrow-left"></i>
            <span>Back to Home</span>
        </a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success)
         {
            localStorage.setItem('userName', result.user.userName);
            localStorage.setItem('userId', result.user.id);
            localStorage.setItem('UserPhone', result.user.phone);

            Swal.fire({
                icon: 'success',
                title: 'Welcome Back!',
                text: result.message,
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                const redirect = sessionStorage.getItem("redirectAfterLogin");

                if (redirect === "true") {
                    window.location.href = "/results.html";
                } else {
                    window.location.href = "/upload_prescription.html"; // or wherever
                }
            });
        } else {
            Swal.fire({ icon: 'error', title: 'Login Failed', text: result.message });
        }
    } catch (err) {
        Swal.fire({ icon: 'error', title: 'Error', text: 'Server is not responding!' });
    }
});
</script>

</body>
</html>
