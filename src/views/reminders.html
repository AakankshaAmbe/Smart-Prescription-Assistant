<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminders | MediMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/reminders.css">
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="logo-section">
            <i class="bi bi-heart-fill"></i>
            <span class="logo-text">MediMate</span>
        </div>

        <button class="btn-menu-toggle d-none" id="openMenuBtn">
            <i class="bi bi-list"></i>
            <div style="font-size: 10px;">Menu</div>
        </button>

        <div id="sidebarMenuContent" class="d-flex flex-column h-100">
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/dashboard.html" class="nav-link">📊 Dashboard</a>
                </li>
                <li class="nav-item">
                    <a href="/upload_prescription.html" class="nav-link">📤 Upload Prescription</a>
                </li>
                <li class="nav-item">
                    <a href="/results.html" class="nav-link">📄 Results</a>
                </li>
                <li class="nav-item">
                    <a href="/reminders.html" class="nav-link active">🔔 Reminders</a>
                </li>
                <li class="nav-item">
                    <a href="/history.html" class="nav-link">🕘 History</a>
                </li>
                <li class="nav-item">
                <a href="/search.html" class="nav-link">🔍 Search Medicine</a>
            </li>
            </ul>
            
            <div class="mt-auto">
                <button class="btn btn-outline-secondary w-100 mb-2" id="closeMenuBtn">
                    <i class="bi bi-arrow-left-circle me-2"></i>Close Menu
                </button>
            </div>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="header-bar d-flex justify-content-between align-items-center mb-4">
            <div class="title-wrap">
                <h1 class="fw-bold" style="color: var(--primary-blue);">Medication Reminders</h1>
                <p class="text-muted">Stay on track with your daily doses</p>
            </div>
            <div class="d-flex gap-3">
                <button class="btn btn-action m-0" onclick="openAdd()">
                    <i class="bi bi-plus-lg"></i> Add Reminder
                </button>
                <a href="/" class="btn-logout-top" id="logoutBtn">
                    <i class="bi bi-box-arrow-left"></i> Logout
                </a>
            </div>
        </div>

        <div class="reminder-list" id="reminderList">
            </div>
    </div>

    <!-- Replace ONLY modal part with this -->

<div class="modal" id="reminderModal">
<div class="modal-box">

<h3 class="fw-bold mb-3">+Add Reminder</h3>

<!-- Medicine Name -->
<div class="mb-3">
    <label>Medicine Name</label>
    <input type="text" id="medicineName" class="form-control" placeholder="Paracetamol 500mg,Amoxicillin 200mg,etc">
</div>



<!-- Frequency -->
<div class="mb-3">
<label>Frequency</label>
<select id="frequency" class="form-select" onchange="updateTimeInputs()">
    <option value="">Select</option>
    <option value="1">Once a day</option>
    <option value="2">Twice a day</option>
    <option value="3">Thrice a day</option>
    <option value="custom">Custom</option>
</select>
</div>

<!-- Custom Times -->
<div id="customTimesBox" class="mb-3" style="display:none;">
    <label>Times per day</label>
    <input type="number" id="customCount" class="form-control" min="1" onchange="updateCustomTimes()">
</div>

<!-- Time Inputs -->
<div id="timeInputs" class="mb-3"></div>

<!-- Duration -->
<div class="mb-3">
<label>Duration (Days)</label>
<input type="number" id="duration" class="form-control" placeholder="e.g. 5">
</div>

<!-- Language -->
<div class="mb-3">
<label>Language</label>
<select id="language" class="form-select">
    <option value="en">English</option>
    <option value="hi">Hindi</option>
    <option value="mr">Marathi</option>
</select>
</div>

<!-- Actions -->
<div class="text-end mt-4">
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveReminder()">Save</button>
</div>

</div>
</div>
    <script src="/js/reminders.js"></script>
</body>
</html>
